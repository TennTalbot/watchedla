<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WatchedLA.com | Know Who's Watching You in Los Angeles</title>
  <meta name="description" content="A free iPhone app that shows you which surveillance cameras are watching you in Los Angeles and helps you find routes with fewer cameras." />
  <meta property="og:title" content="WatchedLA.com" />
  <meta property="og:description" content="Know which cameras are watching you in Los Angeles. Free iPhone app. No data collected. Get early access now." />
  <meta property="og:url" content="https://watchedla.com" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #12121a;
      --surface-2: #1a1a28;
      --border:    rgba(255,255,255,0.07);
      --text:      #f0f0f5;
      --muted:     #888899;
      --blue:      #3b82f6;
      --blue-dim:  rgba(59,130,246,0.12);
      --blue-glow: rgba(59,130,246,0.25);
      --red:       #ef4444;
      --green:     #22c55e;
      --orange:    #f97316;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .container { max-width: 820px; margin: 0 auto; padding: 0 24px; }
    .container-wide { max-width: 1060px; margin: 0 auto; padding: 0 24px; }
    section { padding: 80px 0; }

    /* ── Nav ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    nav .inner {
      max-width: 820px; margin: 0 auto; padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .wordmark { font-size: 1.1rem; font-weight: 800; letter-spacing: 0.05em; color: var(--text); }
    .wordmark span { color: var(--blue); }
    .nav-right { display: flex; align-items: center; gap: 14px; }
    .lang-toggle {
      display: flex; align-items: center; gap: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 99px; padding: 2px; font-size: 0.8rem; font-weight: 600;
    }
    .lang-toggle button {
      padding: 5px 12px; border: none; border-radius: 99px;
      background: transparent; color: var(--muted); cursor: pointer;
      font-size: 0.8rem; font-weight: 600; font-family: inherit;
      transition: all 0.2s;
    }
    .lang-toggle button.active {
      background: var(--blue); color: #fff;
    }
    nav a.cta-sm {
      font-size: 0.82rem; font-weight: 600; color: #fff;
      background: var(--blue); padding: 7px 18px; border-radius: 99px;
      transition: opacity 0.2s; white-space: nowrap;
    }
    nav a.cta-sm:hover { opacity: 0.85; text-decoration: none; }

    /* ── Hero ── */
    .hero { padding: 150px 0 60px; text-align: center; }
    .hero-badge {
      display: inline-block; font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--green); background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.25);
      padding: 5px 14px; border-radius: 99px; margin-bottom: 28px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.2); }
      50% { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
    }
    .hero h1 {
      font-size: clamp(2.4rem, 6vw, 4rem); font-weight: 900;
      line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 24px;
    }
    .hero h1 em { font-style: normal; color: var(--blue); }
    .hero p.lead {
      font-size: clamp(1.05rem, 2.5vw, 1.25rem); color: var(--muted);
      max-width: 600px; margin: 0 auto 40px; line-height: 1.7;
    }

    /* ── CTA ── */
    .cta-group { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 16px 32px; background: var(--blue); color: #fff;
      font-size: 1.05rem; font-weight: 700; border-radius: 14px;
      border: none; cursor: pointer; transition: all 0.2s; text-decoration: none;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); text-decoration: none; }
    .btn-primary svg { width: 22px; height: 22px; }
    .cta-note { font-size: 0.8rem; color: var(--muted); }

    /* ── iPhone-only banner ── */
    .platform-note {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.82rem; color: var(--muted);
      background: var(--surface); border: 1px solid var(--border);
      padding: 6px 16px; border-radius: 99px; margin-top: 14px;
    }
    .platform-note svg { width: 16px; height: 16px; opacity: 0.7; }

    /* ── Stat bar ── */
    .stat-bar {
      display: flex; justify-content: center; gap: 40px; flex-wrap: wrap;
      padding: 32px 0; border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border); margin: 60px 0 0;
    }
    .stat { text-align: center; }
    .stat-number { font-size: 1.8rem; font-weight: 900; color: var(--text); letter-spacing: -0.02em; }
    .stat-label { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

    /* ── App Preview ── */
    .app-preview { padding: 80px 0 40px; }
    .app-preview .section-label, .app-preview h2 { text-align: center; }
    .app-preview h2 { margin-bottom: 48px; }
    .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; max-width: 900px; margin: 0 auto; }
    .preview-card { text-align: center; }
    .preview-card .phone-frame {
      position: relative; border-radius: 28px; overflow: hidden;
      background: var(--surface); border: 2px solid var(--border);
      aspect-ratio: 9/19.5;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px var(--blue-glow);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .preview-card .phone-frame:hover {
      transform: translateY(-6px);
      box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 60px var(--blue-glow);
    }
    .preview-card .phone-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .preview-label { margin-top: 16px; font-weight: 600; font-size: 0.9rem; }
    .preview-sublabel { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

    /* ── Section headers ── */
    .section-label {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--blue); margin-bottom: 12px;
    }
    h2 {
      font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 800;
      letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 16px;
    }
    .section-intro { font-size: 1.1rem; color: var(--muted); max-width: 560px; line-height: 1.7; margin-bottom: 48px; }

    /* ── How it works callout ── */
    .callout-box {
      background: var(--blue-dim); border: 1px solid rgba(59,130,246,0.2);
      border-radius: 14px; padding: 20px 24px;
      display: flex; align-items: flex-start; gap: 14px;
      margin-top: 24px; margin-bottom: 12px;
    }
    .callout-box .icon { font-size: 1.5rem; flex-shrink: 0; }
    .callout-box p { font-size: 0.92rem; color: var(--text); line-height: 1.6; }
    .callout-box strong { color: var(--blue); }

    /* ── Features ── */
    .features { display: flex; flex-direction: column; gap: 20px; }
    .feature-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 32px; display: flex; gap: 24px;
      align-items: flex-start; transition: border-color 0.2s;
    }
    .feature-card:hover { border-color: rgba(255,255,255,0.12); }
    .feature-icon {
      font-size: 2rem; flex-shrink: 0; width: 56px; height: 56px;
      display: flex; align-items: center; justify-content: center;
      background: var(--blue-dim); border-radius: 14px;
    }
    .feature-card h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
    .feature-card p { color: var(--muted); font-size: 0.95rem; line-height: 1.65; }
    .feature-tag {
      display: inline-block; font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      padding: 3px 10px; border-radius: 99px; margin-bottom: 10px;
    }
    .tag-blue { background: var(--blue-dim); color: var(--blue); }
    .tag-orange { background: rgba(249,115,22,0.1); color: var(--orange); }
    .tag-green { background: rgba(34,197,94,0.1); color: var(--green); }

    /* ── Steps ── */
    .steps { display: flex; flex-direction: column; gap: 0; }
    .step { display: flex; gap: 20px; padding: 28px 0; border-bottom: 1px solid var(--border); }
    .step:last-child { border-bottom: none; }
    .step-num {
      font-size: 0.8rem; font-weight: 800; color: #fff; background: var(--blue);
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px;
    }
    .step h4 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
    .step p { color: var(--muted); font-size: 0.95rem; line-height: 1.6; }

    /* ── Promise ── */
    .promise-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
    .promise-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px; text-align: center; transition: border-color 0.2s;
    }
    .promise-card:hover { border-color: rgba(255,255,255,0.12); }
    .promise-card .icon { font-size: 1.8rem; margin-bottom: 12px; }
    .promise-card h4 { font-size: 0.95rem; font-weight: 700; margin-bottom: 6px; }
    .promise-card p { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }

    /* ── Cameras ── */
    .camera-list { display: flex; flex-direction: column; gap: 12px; }
    .camera-row {
      display: flex; align-items: center; gap: 16px; padding: 16px 20px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    }
    .camera-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .dot-red { background: var(--red); } .dot-orange { background: var(--orange); }
    .dot-yellow { background: #eab308; } .dot-green { background: var(--green); }
    .camera-row-name { font-weight: 600; font-size: 0.95rem; flex: 1; }
    .camera-row-risk { font-size: 0.75rem; font-weight: 600; padding: 3px 10px; border-radius: 99px; }
    .risk-critical { background: rgba(239,68,68,0.12); color: var(--red); }
    .risk-high { background: rgba(249,115,22,0.12); color: var(--orange); }
    .risk-medium { background: rgba(234,179,8,0.12); color: #eab308; }

    /* ── Partners ── */
    .partner-links { display: flex; flex-direction: column; gap: 12px; }
    .partner-link {
      display: flex; align-items: center; gap: 16px; padding: 18px 20px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; color: var(--text); transition: border-color 0.2s;
    }
    .partner-link:hover { border-color: var(--blue); text-decoration: none; }
    .partner-link .arrow { margin-left: auto; color: var(--muted); font-size: 0.9rem; }
    .partner-link .name { font-weight: 600; font-size: 0.95rem; }
    .partner-link .desc { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }

    /* ── Footer ── */
    .footer-cta { text-align: center; padding: 80px 0; border-top: 1px solid var(--border); }
    .footer-cta h2 { margin-bottom: 16px; }
    .footer-cta p { color: var(--muted); margin-bottom: 36px; font-size: 1.05rem; }
    footer { border-top: 1px solid var(--border); padding: 32px 0; text-align: center; }
    footer p { font-size: 0.8rem; color: var(--muted); line-height: 1.8; }
    footer a { color: var(--muted); } footer a:hover { color: var(--text); }

    @media (max-width: 700px) {
      .preview-grid { gap: 12px; }
      .preview-card .phone-frame { border-radius: 18px; }
    }
    @media (max-width: 560px) {
      .feature-card { flex-direction: column; }
      .stat-bar { gap: 24px; }
      section { padding: 60px 0; }
      .preview-grid { grid-template-columns: 1fr; max-width: 260px; }
      .callout-box { flex-direction: column; }
    }
  </style>
</head>

<!-- How it works -->
<section style="background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);">
  <div class="container">
    <div class="section-label" data-en="How It Works" data-es="Cómo Funciona"></div>
    <h2 data-en='Built on public data.<br>Runs on your iPhone.' data-es='Basado en datos públicos.<br>Corre en tu iPhone.'></h2>
    <p class="section-intro" data-en="Everything WatchedLA.com shows you comes from public records, community contributors, and city disclosures." data-es="Todo lo que WatchedLA.com te muestra proviene de registros públicos, contribuidores comunitarios, y datos gubernamentales."></p>

    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <div>
          <h4 data-en="Camera Database" data-es="Base de Datos de Cámaras"></h4>
          <p data-en="We map thousands of surveillance cameras in Los Angeles using OpenStreetMap contributors, FOIA requests, LAPD and LADOT public disclosures, and investigative reporting." data-es="Mapeamos miles de cámaras de vigilancia en Los Ángeles usando contribuidores de OpenStreetMap, solicitudes FOIA, datos públicos de LAPD y LADOT, y reportajes investigativos."></p>
        </div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div>
          <h4 data-en="Privacy Score" data-es="Puntaje de Privacidad"></h4>
          <p data-en="Each camera has a risk level based on what it collects and who receives its data. A Flock Safety ALPR reported to feed federal databases scores differently than a basic traffic camera." data-es="Cada cámara tiene un nivel de riesgo basado en qué recolecta y quién recibe sus datos. Un ALPR de Flock Safety que se reporta alimenta bases de datos federales se califica diferente que una cámara de tráfico básica."></p>
        </div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div>
          <h4 data-en="Handoff to Your Maps App" data-es="Envío a Tu App de Mapas"></h4>
          <p data-en="We find the most private route, then send it to Apple Maps, Google Maps, or Waze. Watched LA does not provide turn-by-turn navigation." data-es="Encontramos la ruta más privada y la enviamos a Apple Maps, Google Maps, o Waze. Watched LA no provee navegación paso a paso."></p>
        </div>
      </div>
      <div class="step">

<script>
  let currentLang = 'en';

  function setLang(lang) {
    currentLang = lang;

    // Toggle button styles
    document.querySelectorAll('.lang-toggle button').forEach(btn => {
      btn.classList.toggle('active', btn.textContent.trim() === lang.toUpperCase());
    });

    // Update all data-en/data-es elements
    document.querySelectorAll('[data-' + lang + ']').forEach(el => {
      const text = el.getAttribute('data-' + lang);
      if (el.tagName === 'INPUT') {
        el.placeholder = text;
      } else {
        el.innerHTML = text;
      }
    });

    // Update HTML lang attribute
    document.documentElement.lang = lang;
  }

  // Auto-detect language from browser
  (function() {
    const browserLang = navigator.language || navigator.userLanguage || 'en';
    if (browserLang.startsWith('es')) {
      setLang('es');
    } else {
      setLang('en');
    }
  })();
</script>

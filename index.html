    .nav-right { display: flex; align-items: center; gap: 14px; }

    .lang-toggle button {

    .lang-toggle button.active {

    nav a.cta-sm {

    .camera-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .dot-red { background: var(--red); } .dot-orange { background: var(--orange); }
    .dot-yellow { background: #eab308; } .dot-green { background: var(--green); }
    .camera-row-name { font-weight: 600; font-size: 0.95rem; flex: 1; }

    /* ── Partners ── */

    .partner-link .arrow { margin-left: auto; color: var(--muted); font-size: 0.9rem; }
    .partner-link .name { font-weight: 600; font-size: 0.95rem; }
    .partner-link .desc { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }

    /* ── Footer ── */
    .footer-cta { text-align: center; padding: 80px 0; border-top: 1px solid var(--border); }
    .footer-cta h2 { margin-bottom: 16px; }
    .footer-cta p { color: var(--muted); margin-bottom: 36px; font-size: 1.05rem; }
    footer { border-top: 1px solid var(--border); padding: 32px 0; text-align: center; }
    footer p { font-size: 0.8rem; color: var(--muted); line-height: 1.8; }
    footer a { color: var(--muted); } footer a:hover { color: var(--text); }

    @media (max-width: 700px) {

      .preview-card .phone-frame { border-radius: 18px; }

    @media (max-width: 560px) {
      .feature-card { flex-direction: column; }
      .stat-bar { gap: 24px; }
      section { padding: 60px 0; }
      .preview-grid { grid-template-columns: 1fr; max-width: 260px; }
      .callout-box { flex-direction: column; }
    }
  </style>
</head>

<section style="background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);">
  <div class="container">
    <div class="section-label" data-en="How It Works" data-es="Cómo Funciona"></div>
    <h2 data-en='Built on public data.<br>Runs on your iPhone.' data-es='Basado en datos públicos.<br>Corre en tu iPhone.'></h2>
    <p class="section-intro" data-en="Everything WatchedLA.com shows you comes from public records, community contributors, and city disclosures." data-es="Todo lo que WatchedLA.com te muestra proviene de registros públicos, contribuidores comunitarios, y datos gubernamentales."></p>

    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <div>
          <h4 data-en="Camera Database" data-es="Base de Datos de Cámaras"></h4>
          <p data-en="We map thousands of surveillance cameras in Los Angeles using OpenStreetMap contributors, FOIA requests, LAPD and LADOT public disclosures, ALPRWatch data, and investigative reporting." data-es="Mapeamos miles de cámaras de vigilancia en Los Ángeles usando contribuidores de OpenStreetMap, solicitudes FOIA, datos públicos de LAPD y LADOT, datos de ALPRWatch, y reportajes investigativos."></p>
        </div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div>
          <h4 data-en="Privacy Score" data-es="Puntaje de Privacidad"></h4>
          <p data-en="Each camera has a risk level based on what it collects and who operates it. A Flock Safety ALPR that has been reported to share data with law enforcement scores differently than a basic traffic camera." data-es="Cada cámara tiene un nivel de riesgo basado en qué recolecta y quién la opera. Un ALPR de Flock Safety del que se ha reportado que comparte datos con las fuerzas del orden se califica diferente que una cámara de tráfico básica."></p>
        </div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div>

<script>
  let currentLang = 'en';

  function setLang(lang) {
    currentLang = lang;

    // Toggle button styles
    document.querySelectorAll('.lang-toggle button').forEach(btn => {
      btn.classList.toggle('active', btn.textContent.trim() === lang.toUpperCase());
    });

    // Update all data-en/data-es elements
    document.querySelectorAll('[data-' + lang + ']').forEach(el => {
      const text = el.getAttribute('data-' + lang);
      if (el.tagName === 'INPUT') {
        el.placeholder = text;
      } else if (text.indexOf('<') !== -1) {
        // Only use innerHTML for elements containing HTML tags (e.g. <br>, <em>, <strong>)
        el.innerHTML = text;
      } else {
        el.textContent = text;
      }
    });

    // Update HTML lang attribute
    document.documentElement.lang = lang;
  }

  // Auto-detect language from browser
  (function() {
    const browserLang = navigator.language || navigator.userLanguage || 'en';
    if (browserLang.startsWith('es')) {
      setLang('es');
    } else {
      setLang('en');
    }
  })();
</script>
